<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AnimeOP — GpSirEra</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🎬 Anime<span>OP</span></div>
        <div class="nav-links">
            <a href="#" onclick="showPage('home')" class="active"><i class="fas fa-home"></i> Home</a>
            <a href="#" onclick="showPage('search')"><i class="fas fa-search"></i> Search</a>
            <a href="#" onclick="showPage('top')"><i class="fas fa-trophy"></i> Top</a>
            <a href="#" onclick="showPage('genres')"><i class="fas fa-tags"></i> Genres</a>
        </div>
        <div class="nav-right">
            <span class="badge">⚡ LIVE</span>
            <span class="brand">~GpSirEra</span>
        </div>
    </nav>

    <div id="page-home" class="page active">
        <div class="hero">
            <h1>🔥 Discover Anime</h1>
            <p>Search, Explore, and Watch</p>
        </div>
        <div class="section">
            <h2>📺 Trending Now</h2>
            <div class="grid" id="trendingGrid"><div class="loading">Loading...</div></div>
        </div>
    </div>

    <div id="page-search" class="page">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search anime..." oninput="searchAnime()" />
            <select id="langSelect" onchange="searchAnime()">
                <option value="">All Languages</option>
                <option value="en">English</option>
                <option value="ja">Japanese</option>
                <option value="hi">Hindi</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="zh">Chinese</option>
                <option value="ko">Korean</option>
            </select>
            <button onclick="searchAnime()"><i class="fas fa-search"></i> Search</button>
        </div>
        <div class="grid" id="searchGrid"><div class="loading">Search for anime...</div></div>
    </div>

    <div id="page-top" class="page">
        <div class="section">
            <h2>🏆 Top Anime</h2>
            <div class="filters">
                <button class="active" onclick="loadTop('all')">All</button>
                <button onclick="loadTop('tv')">TV</button>
                <button onclick="loadTop('movie')">Movies</button>
                <button onclick="loadTop('ova')">OVA</button>
                <button onclick="loadTop('special')">Special</button>
            </div>
            <div class="grid" id="topGrid"><div class="loading">Loading...</div></div>
        </div>
    </div>

    <div id="page-genres" class="page">
        <div class="section">
            <h2>📂 Genres</h2>
            <div class="genre-grid" id="genreGrid"></div>
            <div class="grid" id="genreAnimeGrid"></div>
        </div>
    </div>

    <!-- ===== ANIME DETAIL MODAL ===== -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeDetail()">&times;</span>
            <div id="detailBody"></div>
        </div>
    </div>

    <footer>
        <p>© 2026 <strong>AnimeOP</strong> • By ~GpSirEra</p>
        <p class="tag">~#gpsirAI</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
