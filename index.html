<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AnimeOP — Watch Anime</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🎬 Anime<span>OP</span></div>
        <div class="nav-links">
            <a href="#" onclick="showPage('home')" class="active"><i class="fas fa-home"></i> Home</a>
            <a href="#" onclick="showPage('search')"><i class="fas fa-search"></i> Search</a>
            <a href="#" onclick="showPage('popular')"><i class="fas fa-fire"></i> Popular</a>
        </div>
        <div class="nav-right">
            <span class="badge">⚡ LIVE</span>
            <span class="brand">~GpSirEra</span>
        </div>
    </nav>

    <div id="page-home" class="page active">
        <div class="hero">
            <h1>🔥 Watch Anime Free</h1>
            <p>Stream thousands of anime episodes — no ads, no sign-up</p>
        </div>
        <div class="section">
            <h2>📺 Trending Now</h2>
            <div class="grid" id="trendingGrid"><div class="loading">Loading...</div></div>
        </div>
    </div>

    <div id="page-search" class="page">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search anime..." oninput="searchAnime()" />
            <button onclick="searchAnime()"><i class="fas fa-search"></i> Search</button>
        </div>
        <div class="grid" id="searchGrid"><div class="loading">Search for anime...</div></div>
    </div>

    <div id="page-popular" class="page">
        <div class="section">
            <h2>🔥 Popular Anime</h2>
            <div class="grid" id="popularGrid"><div class="loading">Loading...</div></div>
        </div>
    </div>

    <div id="detailPage" class="page">
        <button class="back-btn" onclick="showPage('home')"><i class="fas fa-arrow-left"></i> Back</button>
        <div id="detailContent"></div>
        <div id="episodeGrid" class="episode-grid"></div>
    </div>

    <div id="playerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closePlayer()">&times;</span>
            <h3 id="playerTitle">Now Playing</h3>
            <div id="playerContainer">
                <video id="player" controls autoplay style="width:100%;max-height:70vh;background:#000;border-radius:12px;"></video>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 <strong>AnimeOP</strong> • By ~GpSirEra</p>
        <p class="tag">~#gpsirAI</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
